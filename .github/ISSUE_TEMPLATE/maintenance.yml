---
name: Maintenance
description: Track dependency updates, cleanup, DRY refactors, or repository hygiene.
title: "chore: "
labels:
  - maintenance
  - triage
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - dependency update
        - GitHub Actions or workflow update
        - Renovate configuration
        - labeler or issue templates
        - documentation or AI instructions
        - DRY cleanup
        - validation improvement
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the maintenance work and any files likely to change.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: List commands or manual checks needed before merging.
    validations:
      required: false
