name: ansible

permissions:
  contents: read

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ansible_lint:
    name: ansible-lint
    uses: tenhishadow/github_actions_templates/.github/workflows/taskfile.uv.yaml@main
    with:
      os: ubuntu-latest
      task_target: lint

  ansible_exec:
    name: ansible-exec (${{ matrix.os }})
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    uses: tenhishadow/github_actions_templates/.github/workflows/taskfile.uv.yaml@main
    with:
      os: ${{ matrix.os }}
      task_target: default

  task_all:
    name: task-all (archlinux)
    runs-on: ubuntu-latest
    container:
      image: archlinux:multilib-devel
    env:
      ANSIBLE_FORCE_COLOR: "true"
      UV_PROJECT_ENVIRONMENT: /tmp/dotfiles-task-all-venv
    steps:
      - name: Install bootstrap tools
        run: >-
          pacman --disable-sandbox -Sy
          --noconfirm
          --needed
          --noprogressbar
          git
          go-task
          reflector
          sudo
          uv

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run aggregate target
        run: go-task all -- --skip-tags pkg
