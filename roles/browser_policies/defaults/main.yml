---
browser_policies_enabled: true
browser_policies_state: present

browser_policies_chromium_enabled: true
browser_policies_firefox_enabled: true
browser_policies_vscode_enabled: true

browser_policies_extension_lockdown_enabled: true
browser_policies_extension_block_message: "Extensions are managed by dotfiles."
browser_policies_owner: root
browser_policies_group: root
browser_policies_dir_mode: "0755"
browser_policies_file_mode: "0644"

browser_policies_extension_block_defaults:
  "*":
    installation_mode: blocked
    blocked_install_message: "{{ browser_policies_extension_block_message }}"
browser_policies_extension_block: >-
  {{
    (browser_policies_extension_lockdown_enabled | bool)
    | ternary(browser_policies_extension_block_defaults, {})
  }}

browser_policies_chromium_policy_filename: "10-dotfiles-managed.json"

browser_policies_chromium_base_policies:
  PasswordManagerEnabled: false
  AutofillAddressEnabled: false
  AutofillCreditCardEnabled: false
  PaymentMethodQueryEnabled: false
  # Disabled: Brave does not start reliably with SyncDisabled enforced.
  BrowserSignin: 0
  MetricsReportingEnabled: false
  SearchSuggestEnabled: false
  SpellCheckServiceEnabled: false
  NetworkPredictionOptions: 2
  BackgroundModeEnabled: false
  BrowserGuestModeEnabled: false
  DefaultBrowserSettingEnabled: false
  BlockThirdPartyCookies: true
  SafeBrowsingExtendedReportingEnabled: false
  QuicAllowed: true
  RemoteDebuggingAllowed: false
  DefaultIdleDetectionSetting: 2
  DefaultGeolocationSetting: 2
  HighEfficiencyModeEnabled: true
  HardwareAccelerationModeEnabled: true
  PromptForDownloadLocation: true
  PrivacySandboxPromptEnabled: false
  DomainReliabilityAllowed: false
  AlternateErrorPagesEnabled: false
  UrlKeyedAnonymizedDataCollectionEnabled: false
  FeedbackSurveysEnabled: false
  UserFeedbackAllowed: false
  BasicAuthOverHttpEnabled: false
  SafeBrowsingProtectionLevel: "1"
  DisableSafeBrowsingProceedAnyway: false
  DefaultNotificationsSetting: 2
  SafeBrowsingSurveysEnabled: false
  CompressionDictionaryTransportEnabled: true
  MemorySaverModeSavings: 1

browser_policies_chromium_extension_settings: {}

browser_policies_chromium_targets:
  - name: brave
    enabled: true
    policy_dir: /etc/brave/policies/managed
    policy_filename: "{{ browser_policies_chromium_policy_filename }}"
    policies:
      BraveRewardsDisabled: true
      BraveWalletDisabled: true
      BraveVPNDisabled: true
      BraveNewsDisabled: true
      BraveAIChatEnabled: false
      BravePlaylistEnabled: false
      BraveP3AEnabled: false
      BraveStatsPingEnabled: false
      BraveWebDiscoveryEnabled: false
      BraveTalkDisabled: true
      BraveDeAmpEnabled: true
      BraveDebouncingEnabled: true
      BraveReduceLanguageEnabled: true
      BraveTrackingQueryParametersFilteringEnabled: true
      BraveGlobalPrivacyControlEnabled: true
      DefaultBraveAdblockSetting: 2
      DefaultBraveFingerprintingV2Setting: 3
      DefaultBraveHttpsUpgradeSetting: 3
      DefaultBraveReferrersSetting: 2

browser_policies_firefox_base_policies:
  DisableTelemetry: true
  DisableFirefoxStudies: true
  DisableFirefoxAccounts: true
  DisablePocket: true
  PasswordManagerEnabled: false
  AutofillAddressEnabled: false
  AutofillCreditCardEnabled: false
  FirefoxHome:
    SponsoredTopSites: false
    SponsoredPocket: false
    Pocket: false
    Snippets: false
  UserMessaging:
    ExtensionRecommendations: false
    SkipOnboarding: true

browser_policies_firefox_extension_settings: {}

browser_policies_firefox_targets:
  - name: firefox
    enabled: true
    policy_path: /etc/firefox/policies/policies.json

browser_policies_vscode_base_policies:
  TelemetryLevel: "off"
  EnableFeedback: false

browser_policies_vscode_allowed_extensions: {}

browser_policies_vscode_targets:
  - name: vscode
    enabled: true
    policy_path: /etc/vscode/policy.json
