---
- name: Browser policies | Validate common variables
  ansible.builtin.assert:
    that:
      - browser_policies_state in ["present", "absent"]
      - browser_policies_chromium_targets is sequence
      - browser_policies_chromium_targets is not string
      - browser_policies_firefox_targets is sequence
      - browser_policies_firefox_targets is not string
      - browser_policies_vscode_targets is sequence
      - browser_policies_vscode_targets is not string
      - browser_policies_chromium_base_policies is mapping
      - browser_policies_chromium_extension_settings is mapping
      - browser_policies_default_extension_block is mapping
      - browser_policies_effective_extension_block is mapping
      - browser_policies_firefox_base_policies is mapping
      - browser_policies_firefox_extension_settings is mapping
      - browser_policies_owner is string and browser_policies_owner | length > 0
      - browser_policies_group is string and browser_policies_group | length > 0
      - browser_policies_dir_mode is string and browser_policies_dir_mode | length > 0
      - browser_policies_file_mode is string and browser_policies_file_mode | length > 0
      - browser_policies_vscode_base_policies is mapping
      - browser_policies_vscode_allowed_extensions is mapping
    fail_msg: "browser_policies role variables are invalid."
    success_msg: "browser_policies role variables are valid."

- name: Chromium policies | Validate targets
  ansible.builtin.assert:
    that:
      - item is mapping
      - item.name is defined and item.name is string and item.name | length > 0
      - item.policy_filename is not defined or (item.policy_filename is string and item.policy_filename | length > 0)
      - item.policies is not defined or item.policies is mapping
      - not (item.enabled | default(true) | bool) or (item.managed_dir is defined and item.managed_dir is string and item.managed_dir | length > 0)
    fail_msg: "Invalid Chromium target: {{ item | to_nice_json }}"
  loop: "{{ browser_policies_chromium_targets }}"
  loop_control:
    label: "{{ item.name | default('unnamed chromium target') }}"

- name: Path policies | Validate targets
  ansible.builtin.assert:
    that:
      - item.target is mapping
      - >-
        item.target.name is defined
        and item.target.name is string
        and item.target.name | length > 0
      - item.target.policies is not defined or item.target.policies is mapping
      - >-
        not (item.target.enabled | default(true) | bool)
        or (
          item.target.policy_path is defined
          and item.target.policy_path is string
          and item.target.policy_path | length > 0
        )
    fail_msg: "Invalid {{ item.family }} target: {{ item.target | to_nice_json }}"
  vars:
    browser_policies_path_targets: >-
      {%- set results = [] -%}
      {%- for target in browser_policies_firefox_targets -%}
      {%-   set _ = results.append(
              {
                'family': 'Firefox',
                'label': target.name | default('unnamed firefox target'),
                'target': target,
              }
            )
      -%}
      {%- endfor -%}
      {%- for target in browser_policies_vscode_targets -%}
      {%-   set _ = results.append(
              {
                'family': 'VS Code',
                'label': target.name | default('unnamed vscode target'),
                'target': target,
              }
            )
      -%}
      {%- endfor -%}
      {{ results }}
  loop: "{{ browser_policies_path_targets }}"
  loop_control:
    label: "{{ item.family }}: {{ item.label }}"
