---
- name: browser_policies | validate common variables
  ansible.builtin.assert:
    that:
      - browser_policies_state in ["present", "absent"]
      - browser_policies_chromium_targets is sequence
      - browser_policies_chromium_targets is not string
      - browser_policies_firefox_targets is sequence
      - browser_policies_firefox_targets is not string
      - browser_policies_vscode_targets is sequence
      - browser_policies_vscode_targets is not string
      - browser_policies_chromium_base_policies is mapping
      - browser_policies_chromium_extension_settings is mapping
      - browser_policies_firefox_base_policies is mapping
      - browser_policies_firefox_extension_settings is mapping
      - browser_policies_vscode_base_policies is mapping
      - browser_policies_vscode_allowed_extensions is mapping
    fail_msg: "browser_policies role variables are invalid."
    success_msg: "browser_policies role variables are valid."

- name: browser_policies | validate chromium targets
  ansible.builtin.assert:
    that:
      - item is mapping
      - item.name is defined and item.name is string and item.name | length > 0
      - item.policy_filename is not defined or (item.policy_filename is string and item.policy_filename | length > 0)
      - item.policies is not defined or item.policies is mapping
      - not (item.enabled | default(true) | bool) or (item.managed_dir is defined and item.managed_dir is string and item.managed_dir | length > 0)
    fail_msg: "Invalid Chromium target: {{ item | to_nice_json }}"
  loop: "{{ browser_policies_chromium_targets }}"
  loop_control:
    label: "{{ item.name | default('unnamed chromium target') }}"

- name: browser_policies | validate firefox targets
  ansible.builtin.assert:
    that:
      - item is mapping
      - item.name is defined and item.name is string and item.name | length > 0
      - item.policies is not defined or item.policies is mapping
      - not (item.enabled | default(true) | bool) or (item.policy_path is defined and item.policy_path is string and item.policy_path | length > 0)
    fail_msg: "Invalid Firefox target: {{ item | to_nice_json }}"
  loop: "{{ browser_policies_firefox_targets }}"
  loop_control:
    label: "{{ item.name | default('unnamed firefox target') }}"

- name: browser_policies | validate vscode targets
  ansible.builtin.assert:
    that:
      - item is mapping
      - item.name is defined and item.name is string and item.name | length > 0
      - item.policies is not defined or item.policies is mapping
      - not (item.enabled | default(true) | bool) or (item.policy_path is defined and item.policy_path is string and item.policy_path | length > 0)
    fail_msg: "Invalid VS Code target: {{ item | to_nice_json }}"
  loop: "{{ browser_policies_vscode_targets }}"
  loop_control:
    label: "{{ item.name | default('unnamed vscode target') }}"
