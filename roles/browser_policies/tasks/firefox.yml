---
- name: Firefox policies | Ensure directories
  ansible.builtin.file:
    path: "{{ item.policy_path | dirname }}"
    state: directory
    owner: "{{ browser_policies_owner }}"
    group: "{{ browser_policies_group }}"
    mode: "{{ browser_policies_dir_mode }}"
  loop: "{{ browser_policies_firefox_targets }}"
  loop_control:
    label: "{{ item.policy_path | dirname }}"
  when:
    - browser_policies_state == "present"
    - item.enabled | default(true) | bool

- name: Firefox policies | Write policies.json
  ansible.builtin.copy:
    dest: "{{ item.policy_path }}"
    content: "{{ {'policies': browser_policies_firefox_rendered_policy} | to_nice_json }}\n"
    owner: "{{ browser_policies_owner }}"
    group: "{{ browser_policies_group }}"
    mode: "{{ browser_policies_file_mode }}"
    backup: false
  vars:
    browser_policies_firefox_effective_extension_settings: >-
      {{
        browser_policies_effective_extension_block
        | combine(
            browser_policies_firefox_extension_settings,
            recursive=True
          )
      }}
    browser_policies_firefox_rendered_policy: >-
      {{
        browser_policies_firefox_base_policies
        | combine(item.policies | default({}), recursive=True)
        | combine(
            (
              browser_policies_firefox_effective_extension_settings | length > 0
            )
            | ternary(
                {
                  'ExtensionSettings':
                    browser_policies_firefox_effective_extension_settings,
                },
                {}
              ),
            recursive=True
          )
      }}
  loop: "{{ browser_policies_firefox_targets }}"
  loop_control:
    label: "{{ item.policy_path }}"
  when:
    - browser_policies_state == "present"
    - item.enabled | default(true) | bool
  notify: Browser policies | Report restart requirement

- name: Firefox policies | Remove policies.json
  ansible.builtin.file:
    path: "{{ item.policy_path }}"
    state: absent
  loop: "{{ browser_policies_firefox_targets }}"
  loop_control:
    label: "{{ item.policy_path }}"
  when:
    - browser_policies_state == "absent"
    - item.enabled | default(true) | bool
  notify: Browser policies | Report restart requirement
