---
- name: Dotfiles | Validate inputs
  ansible.builtin.include_tasks:
    file: validate.yml

- name: Dotfiles | Check payload sources
  ansible.builtin.stat:
    path: "{{ dotfiles_location }}/{{ dotfiles_link.payload }}"
  loop: "{{ dotfiles_mapping }}"
  loop_control:
    loop_var: dotfiles_link
    label: "{{ dotfiles_location }}/{{ dotfiles_link.payload }}"
  register: dotfiles_payload_stats
  changed_when: false
  tags:
    - configs

- name: Dotfiles | Validate payload sources
  ansible.builtin.assert:
    that:
      - dotfiles_payload_stat.stat.exists
    fail_msg: >-
      Missing dotfiles payload source:
      {{ dotfiles_location }}/{{ dotfiles_payload_stat.dotfiles_link.payload }}
    quiet: true
  loop: "{{ dotfiles_payload_stats.results }}"
  loop_control:
    loop_var: dotfiles_payload_stat
    label: "{{ dotfiles_location }}/{{ dotfiles_payload_stat.dotfiles_link.payload }}"
  tags:
    - configs

- name: Dotfiles | Ensure extra directories
  ansible.builtin.file:
    path: "{{ dotfiles_directory.path }}"
    state: directory
    mode: "{{ dotfiles_directory.mode | default(dotfiles_directory_mode) }}"
    owner: "{{ dotfiles_directory.owner | default(dotfiles_owner) }}"
    group: "{{ dotfiles_directory.group | default(dotfiles_group) }}"
  loop: "{{ dotfiles_directories }}"
  loop_control:
    loop_var: dotfiles_directory
    label: "{{ dotfiles_directory.path }}"
  tags:
    - configs

- name: Dotfiles | Ensure mapping parent directories
  ansible.builtin.file:
    path: "{{ dotfiles_parent_dir }}"
    state: directory
    mode: "{{ dotfiles_directory_mode }}"
    owner: "{{ dotfiles_owner }}"
    group: "{{ dotfiles_group }}"
  loop: >-
    {{
      dotfiles_mapping
      | map(attribute='dest')
      | map('dirname')
      | unique
      | difference([dotfiles_home])
      | list
    }}
  loop_control:
    loop_var: dotfiles_parent_dir
    label: "{{ dotfiles_parent_dir }}"
  tags:
    - configs

- name: Dotfiles | Link managed files
  ansible.builtin.file:
    src: "{{ dotfiles_location }}/{{ dotfiles_link.payload }}"
    dest: "{{ dotfiles_link.dest }}"
    force: true
    state: link
  loop: "{{ dotfiles_mapping }}"
  loop_control:
    loop_var: dotfiles_link
    label: "{{ dotfiles_link.dest }}"
  tags:
    - configs

- name: Dotfiles | Remove legacy paths
  ansible.builtin.file:
    path: "{{ dotfiles_cleanup_path }}"
    state: absent
  loop: "{{ dotfiles_cleanup_paths }}"
  loop_control:
    loop_var: dotfiles_cleanup_path
    label: "{{ dotfiles_cleanup_path }}"
  tags:
    - configs

- name: Dotfiles | Check crontab binary
  ansible.builtin.stat:
    path: "{{ dotfiles_crontab_path }}"
  register: dotfiles_crontab_stat
  changed_when: false

- name: Dotfiles | Ensure Neovim state directory
  ansible.builtin.file:
    path: "{{ dotfiles_nvim_state_dir }}"
    state: directory
    owner: "{{ dotfiles_owner }}"
    group: "{{ dotfiles_group }}"
    mode: "{{ dotfiles_directory_mode }}"
  when:
    - dotfiles_crontab_stat.stat.exists | default(false)

- name: Dotfiles | Schedule Neovim restore
  ansible.builtin.cron:
    state: present
    name: "{{ dotfiles_nvim_restore_cron_name }}"
    job: "{{ dotfiles_nvim_restore_cron_job }}"
    special_time: daily
  when:
    - dotfiles_crontab_stat.stat.exists | default(false)

- name: Dotfiles | Remove legacy cron jobs
  ansible.builtin.cron:
    state: absent
    name: "{{ dotfiles_cron_name }}"
  loop: "{{ dotfiles_legacy_cron_names }}"
  loop_control:
    loop_var: dotfiles_cron_name
    label: "{{ dotfiles_cron_name }}"
  when:
    - dotfiles_crontab_stat.stat.exists | default(false)

- name: Dotfiles | Remove legacy PAM environment
  ansible.builtin.file:
    path: "{{ dotfiles_pam_environment_path }}"
    state: absent
