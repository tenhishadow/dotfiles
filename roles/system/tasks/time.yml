---
- name: Timezone | Install tzdata
  become: true
  ansible.builtin.package:
    name: "{{ system_tzdata_package }}"
    state: present
  when:
    - system_packages_enabled | bool
  tags:
    - pkg

- name: Timezone | Set timezone
  become: true
  community.general.timezone:
    name: "{{ system_timezone }}"
  when:
    - not (system_is_container | bool)

- name: Timesyncd | Gather service facts
  become: true
  ansible.builtin.service_facts:
  when:
    - system_can_manage_timesyncd | bool

- name: Timesyncd | Disable conflicting NTP services
  become: true
  ansible.builtin.systemd_service:
    name: "{{ system_ntp_conflicting_service }}"
    state: stopped
    enabled: false
    masked: true
  loop: "{{ system_ntp_conflicting_services }}"
  loop_control:
    loop_var: system_ntp_conflicting_service
    label: "{{ system_ntp_conflicting_service }}"
  when:
    - system_can_manage_timesyncd | bool
    - system_ntp_conflicting_service ~ ".service" in (ansible_facts.services | default({}))

- name: Timesyncd | Ensure service enabled
  become: true
  ansible.builtin.service:
    name: "{{ system_ntp_service }}"
    state: started
    enabled: true
  when:
    - system_can_manage_timesyncd | bool
