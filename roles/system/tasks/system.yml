---
- name: Locale | Check definitions
  ansible.builtin.stat:
    path: "{{ item.1 }}/{{ item.0 }}"
  loop: "{{ system_locales | product(system_locale_definition_dirs) | list }}"
  register: system_locale_defs
  changed_when: false

- name: Locale | Build available list
  ansible.builtin.set_fact:
    system_locale_available: "{{ system_locale_available_tmp }}"
    system_locale_missing_defs: "{{ system_locales | difference(system_locale_available_tmp) }}"
  vars:
    system_locale_available_tmp: >-
      {{ system_locale_defs.results
         | selectattr('stat.exists')
         | map(attribute='item.0')
         | unique
         | list }}

- name: Locale | Write locale.gen
  become: true
  ansible.builtin.template:
    backup: true
    src: templates/locale.gen.j2
    dest: "{{ system_locale_gen_path }}"
    owner: "{{ system_config_owner }}"
    group: "{{ system_config_group }}"
    mode: "{{ system_config_file_mode }}"
  notify:
    - Console | Restart vconsole setup

- name: Locale | Write locale.conf
  become: true
  ansible.builtin.template:
    backup: true
    src: templates/locale.conf.j2
    dest: "{{ system_locale_conf_path }}"
    owner: "{{ system_config_owner }}"
    group: "{{ system_config_group }}"
    mode: "{{ system_config_file_mode }}"
  notify:
    - Console | Restart vconsole setup

- name: Locale | List generated locales
  become: true
  ansible.builtin.command: locale -a
  register: system_locale_list
  changed_when: false

- name: Locale | Generate missing locales
  become: true
  ansible.builtin.command: locale-gen
  changed_when: true
  vars:
    desired_locales: >-
      {{ system_locale_available
         | map('regex_replace', '$', '.utf8')
         | map('lower')
         | list }}
    current_locales: "{{ system_locale_list.stdout_lines | map('lower') | list }}"
    missing_locales: "{{ desired_locales | difference(current_locales) }}"
  when:
    - not (system_in_ci | bool)
    - missing_locales | length > 0

- name: Console | Write vconsole.conf
  become: true
  ansible.builtin.template:
    backup: true
    src: templates/vconsole.conf.j2
    dest: "{{ system_vconsole_path }}"
    owner: "{{ system_config_owner }}"
    group: "{{ system_config_group }}"
    mode: "{{ system_config_file_mode }}"
  notify:
    - Console | Restart vconsole setup

- name: Login | Write motd
  become: true
  ansible.builtin.template:
    backup: true
    src: templates/motd.j2
    dest: "{{ system_motd_path }}"
    owner: "{{ system_config_owner }}"
    group: "{{ system_config_group }}"
    mode: "{{ system_config_file_mode }}"

- name: Login | Write issue
  become: true
  ansible.builtin.template:
    backup: true
    src: templates/issue.j2
    dest: "{{ system_issue_path }}"
    owner: "{{ system_config_owner }}"
    group: "{{ system_config_group }}"
    mode: "{{ system_config_file_mode }}"

- name: Cron | Ensure service enabled
  become: true
  ansible.builtin.systemd_service:
    state: started
    daemon_reload: true
    name: "{{ system_cron_service_name }}"
    enabled: true
  when:
    - system_can_manage_systemd | bool

- name: Sysctl | Apply kernel parameters
  become: true
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
    sysctl_file: "{{ system_sysctl_file_path }}"
  with_dict: "{{ sysctl_params }}"
  when:
    - configure_sysctl | bool
    - not (system_is_container | bool)
    - not (system_in_ci | bool)

- name: Journald | Read legacy main config
  become: true
  ansible.builtin.slurp:
    path: "{{ system_journald_main_path }}"
  register: system_journald_main_config
  when:
    - not (system_is_container | bool)

- name: Journald | Reset legacy main-file settings
  become: true
  ansible.builtin.lineinfile:
    path: "{{ system_journald_main_path }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    owner: "{{ system_config_owner }}"
    group: "{{ system_config_group }}"
    mode: "{{ system_config_file_mode }}"
    backup: true
  loop: "{{ system_journald_legacy_main_lines }}"
  loop_control:
    label: "{{ item.regexp }}"
  notify: Journald | Restart service
  when:
    - not (system_is_container | bool)
    - >-
      (system_journald_main_config.content | b64decode)
      is regex('(?m)^' ~ (system_legacy_managed_marker | regex_escape) ~ '$')

- name: Journald | Ensure drop-in directory
  become: true
  ansible.builtin.file:
    path: "{{ system_journald_dropin_dir }}"
    state: directory
    owner: "{{ system_config_owner }}"
    group: "{{ system_config_group }}"
    mode: "{{ system_config_dir_mode }}"
  when:
    - not (system_is_container | bool)

- name: Journald | Write drop-in
  become: true
  ansible.builtin.template:
    backup: true
    src: templates/journald-dropin.conf.j2
    dest: "{{ system_journald_dropin_path }}"
    owner: "{{ system_config_owner }}"
    group: "{{ system_config_group }}"
    mode: "{{ system_config_file_mode }}"
  notify: Journald | Restart service
  when:
    - not (system_is_container | bool)

- name: Journald | Remove legacy drop-ins
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ system_journald_legacy_dropin_paths }}"
  loop_control:
    label: "{{ item }}"
  notify: Journald | Restart service
  when:
    - not (system_is_container | bool)
    - item != system_journald_dropin_path

- name: SSHD | Read main config
  become: true
  ansible.builtin.slurp:
    path: "{{ system_sshd_main_path }}"
  register: system_sshd_main_config
  when:
    - not (system_is_container | bool)
    - not (system_in_ci | bool)
  tags: sshd

- name: SSHD | Verify drop-in include
  ansible.builtin.assert:
    that:
      - >-
        (system_sshd_main_config.content | b64decode)
        is regex(
          '(?m)^\\s*Include\\s+'
          ~ (system_sshd_dropin_include_path | regex_escape)
          ~ '\\s*$'
        )
    fail_msg: >-
      {{ system_sshd_main_path }} must include
      {{ system_sshd_dropin_include_path }}
      before this role can manage sshd through a drop-in.
    quiet: true
  when:
    - not (system_is_container | bool)
    - not (system_in_ci | bool)
  tags: sshd

- name: SSHD | Ensure drop-in directory
  become: true
  ansible.builtin.file:
    path: "{{ system_sshd_dropin_dir }}"
    state: directory
    owner: "{{ system_config_owner }}"
    group: "{{ system_config_group }}"
    mode: "{{ system_config_dir_mode }}"
  when:
    - not (system_is_container | bool)
    - not (system_in_ci | bool)
  tags: sshd

- name: SSHD | Write drop-in
  become: true
  ansible.builtin.template:
    backup: true
    src: templates/sshd-dropin.conf.j2
    dest: "{{ system_sshd_dropin_path }}"
    owner: "{{ system_config_owner }}"
    group: "{{ system_config_group }}"
    mode: "{{ system_config_file_mode }}"
    validate: "{{ system_sshd_binary_path }} -T -f %s"
  when:
    - not (system_is_container | bool)
    - not (system_in_ci | bool)
  notify: SSHD | Restart service
  tags: sshd

- name: SSHD | Remove legacy drop-ins
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ system_sshd_legacy_dropin_paths }}"
  loop_control:
    label: "{{ item }}"
  when:
    - not (system_is_container | bool)
    - not (system_in_ci | bool)
    - item != system_sshd_dropin_path
  notify: SSHD | Restart service
  tags: sshd

- name: SSHD | Remove legacy main-file settings
  become: true
  ansible.builtin.lineinfile:
    path: "{{ system_sshd_main_path }}"
    regexp: '^{{ item.key | regex_escape }}\s+{{ item.value | regex_escape }}\s*$'
    state: absent
    owner: "{{ system_config_owner }}"
    group: "{{ system_config_group }}"
    mode: "{{ system_config_file_mode }}"
    backup: true
  loop: "{{ (sshd_config | dict2items) + system_sshd_legacy_main_cleanup }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - not (system_is_container | bool)
    - not (system_in_ci | bool)
  notify: SSHD | Restart service
  tags: sshd

- name: SSHD | Validate effective config
  become: true
  ansible.builtin.command: "{{ system_sshd_binary_path }} -T"
  changed_when: false
  when:
    - not (system_is_container | bool)
    - not (system_in_ci | bool)
  tags: sshd
