---
- name: Journald | Restart service
  become: true
  ansible.builtin.service:
    name: systemd-journald
    state: restarted

- name: SSHD | Restart service
  become: true
  ansible.builtin.service:
    name: sshd
    state: restarted
    enabled: true

- name: Docker | Restart service
  become: true
  ansible.builtin.service:
    name: docker
    state: restarted

- name: NTP | Restart service
  become: true
  ansible.builtin.service:
    name: "{{ system_ntp_service }}"
    state: restarted
    enabled: true
  when:
    - system_can_manage_systemd | default(false) | bool

- name: Console | Restart vconsole setup
  become: true
  ansible.builtin.service:
    name: systemd-vconsole-setup.service
    state: restarted
  when:
    - system_can_manage_systemd | default(false) | bool

- name: User systemd | Restart ssh-agent
  ansible.builtin.systemd:
    scope: user
    name: ssh-agent.service
    state: restarted
    enabled: true
    daemon_reload: true
