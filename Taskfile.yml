# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  RUN_PLAYBOOK: "uv run ansible-playbook playbook_install.yml {{.CLI_ARGS}}"
  RUN_SYSTEM_PLAYBOOK: "uv run ansible-playbook playbook_system.yml --diff {{.CLI_ARGS}}"
  VINT_TARGETS: "dotfiles/.vimrc dotfiles/.config/nvim"
  DEPS_OS_ARCHLINUX: "pacman -Sy --noconfirm --needed --noprogressbar uv git"
  DEPS_OS_SYSTEM_ARCHLINUX: "pacman -Sy --noconfirm --needed --noprogressbar uv git sudo"
  DEPS_VERIFY_ARCHLINUX: "pacman -Sy --noconfirm --needed --noprogressbar actionlint nodejs npm pre-commit"
  MITOGEN_VARS: "ANSIBLE_STRATEGY=serverscom.mitogen.mitogen_linear"
  SUPERLINTER_DOCKER_RUN: >-
    docker run
    --rm
    -e LOG_LEVEL=ERROR
    -e RUN_LOCAL=true
    -e USE_FIND_ALGORITHM=true
    -e VALIDATE_ALL_CODEBASE=true
    -e VALIDATE_BIOME_FORMAT=false
    -e VALIDATE_EDITORCONFIG=false
    -e VALIDATE_GITHUB_ACTIONS_ZIZMOR=false
    -e VALIDATE_LUA=false
    -e VALIDATE_MARKDOWN=false
    -e VALIDATE_MARKDOWN_PRETTIER=false
    -e VALIDATE_NATURAL_LANGUAGE=false
    -e VALIDATE_SHELL_SHFMT=false
    -e VALIDATE_TRIVY=false
    -e FILTER_REGEX_EXCLUDE='(^|/)(\.ansible/|\.collections/|\.task/|\.test/nvim/|\.venv/)'
    -v $(pwd):/tmp/lint

tasks:
  deps-os:
    status:
      - $SHELL -c 'type -P uv'
    cmd: >-
      {{.DEPS_OS_ARCHLINUX}}
      || sudo {{.DEPS_OS_ARCHLINUX}}
  deps-os-system:
    status:
      - $SHELL -c 'type -P uv'
      - $SHELL -c 'type -P git'
      - $SHELL -c 'type -P sudo'
    cmd: >-
      {{.DEPS_OS_SYSTEM_ARCHLINUX}}
      || sudo {{.DEPS_OS_SYSTEM_ARCHLINUX}}
  deps-python:
    silent: true
    deps: [deps-os]
    cmd: >-
      uv sync
      --locked
      --no-build
      --no-install-project
      --no-dev
      --managed-python
      --quiet
  deps-galaxy:
    silent: true
    deps: [deps-python]
    cmds:
      - "uv run ansible-galaxy install -r requirements.yml"
  deps-verify:
    deps: [deps-os]
    status:
      - $SHELL -c 'type -P actionlint'
      - $SHELL -c 'type -P npx'
      - $SHELL -c 'type -P pre-commit'
    cmd: >-
      {{.DEPS_VERIFY_ARCHLINUX}} || sudo {{.DEPS_VERIFY_ARCHLINUX}}
  deps-upgrade:
    cmds:
      - task: deps-upgrade:python
      - task: deps-upgrade:ansible
      - task: deps-upgrade:pre-commit
      - task: deps-upgrade:nvim
      - task: renovate
  deps-upgrade:python:
    deps: [deps-os]
    cmds:
      - uv lock --upgrade
      - >-
        uv sync
        --locked
        --no-build
        --no-install-project
        --no-dev
        --managed-python
  deps-upgrade:ansible:
    deps: [deps-python]
    cmd: "uv run ansible-galaxy collection install -r requirements.yml --upgrade"
  deps-upgrade:pre-commit:
    deps: [deps-verify]
    cmd: pre-commit autoupdate
  deps-upgrade:nvim:
    cmd: NVIM_USE_MASON=off nvim --headless "+Lazy! update" +qa
  deps-report:github-actions:
    deps: [deps-verify]
    cmd: >-
      npx --yes --package renovate renovate
      --platform=local
      --dry-run=full
      --require-config=required
      --enabled-managers=github-actions
      --include-paths='[".github/workflows/**"]'
  update:
    cmds:
      - git pull --ff-only
      - go-task

  lint:
    deps: [deps-python]
    cmds:
      - "uv run ansible-lint --exclude .test/"
  yamllint:
    deps: [deps-python]
    cmd: "uv run yamllint ."
  vint:
    deps: [deps-python]
    cmd: "PYTHONWARNINGS=ignore uv run vint --enable-neovim {{.VINT_TARGETS}}"
  docs:nvim-keymaps:
    cmds:
      - mkdir -p docs
      - >-
        timeout 120s nvim --headless --clean -u NONE
        '+lua dofile(".test/nvim/keymap_docs.lua")'
        +qa > docs/nvim-keymaps.md
  docs:nvim-keymaps:check:
    cmds:
      - >-
        tmp="$(mktemp)";
        trap 'rm -f "${tmp}"' EXIT;
        timeout 120s nvim --headless --clean -u NONE
        '+lua dofile(".test/nvim/keymap_docs.lua")'
        +qa > "${tmp}";
        diff -u docs/nvim-keymaps.md "${tmp}"
  diff-check:
    cmd: git diff --check
  actionlint:
    deps: [deps-verify]
    cmd: actionlint .github/workflows/*.yml
  renovate:
    deps: [deps-verify]
    cmd: >-
      if type -P renovate-config-validator >/dev/null;
      then renovate-config-validator --strict;
      else npx --yes --package renovate renovate-config-validator --strict;
      fi
  pre-commit:
    deps: [deps-verify]
    cmd: pre-commit run --all-files
  verify:
    deps: [deps-galaxy, deps-verify]
    cmds:
      - task: diff-check
      - task: lint
      - task: yamllint
      - task: vint
      - task: docs:nvim-keymaps:check
      - task: actionlint
      - task: renovate
      - task: pre-commit
      - task: default
      - task: system:check
      - task: browser-policies:check
  superlinter:
    cmds:
      - "{{.SUPERLINTER_DOCKER_RUN}} ghcr.io/super-linter/super-linter:v8.6.0"
  superlinter:latest:
    cmds:
      - "{{.SUPERLINTER_DOCKER_RUN}} ghcr.io/super-linter/super-linter:latest"
  clear:
    cmd: >-
      rm -rf
      .ansible
      .collections
      .task
      .venv
  default:
    deps: [deps-galaxy]
    cmd: "{{.MITOGEN_VARS}} {{.RUN_PLAYBOOK}}"
  system:
    deps: [deps-galaxy]
    cmds:
      - task: deps-os-system
      - "{{.MITOGEN_VARS}} {{.RUN_SYSTEM_PLAYBOOK}}"
  system:check:
    deps: [deps-galaxy]
    cmds:
      - task: deps-os-system
      - "{{.MITOGEN_VARS}} {{.RUN_SYSTEM_PLAYBOOK}} --check"
  system:list:
    deps: [deps-python]
    cmd: "uv run ansible-playbook --list-tasks playbook_system.yml"
  pacdiff:
    cmd: >-
      type -P pacdiff >/dev/null
      || {
        printf '%s\n' 'pacdiff is missing; run go-task system first or install pacman-contrib.';
        exit 1;
      };
      pacdiff -o
  browser-policies:
    deps: [deps-galaxy]
    cmd: "{{.MITOGEN_VARS}} uv run ansible-playbook playbook_browser_policies.yml {{.CLI_ARGS}}"
  browser-policies:check:
    deps: [deps-galaxy]
    cmd: "{{.MITOGEN_VARS}} uv run ansible-playbook playbook_browser_policies.yml --check --diff {{.CLI_ARGS}}"
  test:nvim:
    env:
      XDG_CONFIG_HOME: "{{.PWD}}/.test/nvim/.config"
      XDG_DATA_HOME: "{{.PWD}}/.test/nvim/.data"
      XDG_STATE_HOME: "{{.PWD}}/.test/nvim/.state"
      XDG_CACHE_HOME: "{{.PWD}}/.test/nvim/.cache"
      GOENV: "{{.PWD}}/.test/nvim/.state/go/env"
      NVIM_USE_MASON: "off"
      NVIM_TS_INSTALL: "auto"
      NVIM_TS_TIMEOUT_MS: "120000"
    cmds:
      - >-
        rm -rf
        .test/nvim/.config/nvim
        .test/nvim/.data/nvim
        .test/nvim/.state/nvim
        .test/nvim/.cache/nvim
      - mkdir -p .test/nvim/.config .test/nvim/.data .test/nvim/.state .test/nvim/.cache
      - cp -a dotfiles/.config/nvim .test/nvim/.config/
      - timeout 300s nvim --headless "+Lazy! restore" +qa
      - diff -u dotfiles/.config/nvim/lazy-lock.json .test/nvim/.config/nvim/lazy-lock.json
      - timeout 180s nvim --headless "+lua dofile('.test/nvim/treesitter_install.lua')" +qa
      - timeout 120s nvim --headless "+checkhealth" +qa
      - timeout 120s nvim --headless "+checkhealth vim.lsp" +qa
      - timeout 120s nvim --headless "+lua dofile('.test/nvim/smoke.lua')"
  test:nvim:compat:
    env:
      XDG_CONFIG_HOME: "{{.PWD}}/.test/nvim/.config"
      XDG_DATA_HOME: "{{.PWD}}/.test/nvim/.data"
      XDG_STATE_HOME: "{{.PWD}}/.test/nvim/.state"
      XDG_CACHE_HOME: "{{.PWD}}/.test/nvim/.cache"
      NVIM_DOTFILES_DISABLE_PLUGINS: "1"
      NVIM_USE_MASON: "off"
    cmds:
      - >-
        rm -rf
        .test/nvim/.config/nvim
        .test/nvim/.data/nvim
        .test/nvim/.state/nvim
        .test/nvim/.cache/nvim
      - mkdir -p .test/nvim/.config .test/nvim/.data .test/nvim/.state .test/nvim/.cache
      - cp -a dotfiles/.config/nvim .test/nvim/.config/
      - timeout 60s nvim --headless "+lua dofile('.test/nvim/compat.lua')"
  test:nvim:all:
    cmds:
      - task: test:nvim
      - task: test:nvim:compat
  test:nvim:profile:
    deps: [test:nvim]
    env:
      XDG_CONFIG_HOME: "{{.PWD}}/.test/nvim/.config"
      XDG_DATA_HOME: "{{.PWD}}/.test/nvim/.data"
      XDG_STATE_HOME: "{{.PWD}}/.test/nvim/.state"
      XDG_CACHE_HOME: "{{.PWD}}/.test/nvim/.cache"
      NVIM_USE_MASON: "off"
    cmds:
      - >-
        profile_log="$(mktemp)";
        trap 'rm -f "${profile_log}"' EXIT;
        timeout 120s nvim --headless --startuptime "${profile_log}" +qa >/dev/null 2>&1;
        awk '/--- NVIM STARTED ---/ { printf "startup_ms=%s\n", $1 }' "${profile_log}"
      - >-
        timeout 120s nvim --headless
        '+lua local cfg=require("lazy.core.config"); local names={}; local total=0; for name,p in pairs(cfg.plugins) do total=total+1; if p._ and p._.loaded then table.insert(names,name) end end; table.sort(names); print("plugins_total=" .. total); print("plugins_loaded=" .. #names); print("loaded_plugins=" .. table.concat(names,","))'
        +qa
  test:system:
    cmd: >-
      docker run --rm -i
      -v "$(pwd):/.dotfiles:ro"
      archlinux:multilib-devel
      bash -c 'cd .dotfiles && ./.test/system/exec.sh'
