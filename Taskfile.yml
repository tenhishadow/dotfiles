# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  RUN_PLAYBOOK: "uv run ansible-playbook playbook_install.yml {{.CLI_ARGS}}"
  RUN_SYSTEM_PLAYBOOK: "uv run ansible-playbook playbook_system.yml --diff {{.CLI_ARGS}}"
  RUN_BROWSER_PLAYBOOK: "uv run ansible-playbook playbook_browser_policies.yml"
  VINT_TARGETS: "dotfiles/.vimrc dotfiles/.config/nvim"
  STYLUA_TARGETS: "dotfiles/.config/nvim .test/nvim"
  PACMAN_INSTALL: "pacman -Sy --noconfirm --needed --noprogressbar"
  DEPS_OS_ARCHLINUX: "{{.PACMAN_INSTALL}} uv git"
  DEPS_OS_SYSTEM_ARCHLINUX: "{{.PACMAN_INSTALL}} uv git sudo"
  DEPS_VERIFY_ARCHLINUX: "{{.PACMAN_INSTALL}} actionlint nodejs npm pre-commit stylua"
  SUPERLINTER_IMAGE_TAG: "v8.6.0"
  SUPERLINTER_DOCKER_RUN: >-
    docker run
    --rm
    -e LOG_LEVEL=ERROR
    -e RUN_LOCAL=true
    -e USE_FIND_ALGORITHM=true
    -e VALIDATE_ALL_CODEBASE=true
    -e VALIDATE_BIOME_FORMAT=false
    -e VALIDATE_EDITORCONFIG=false
    -e VALIDATE_GITHUB_ACTIONS_ZIZMOR=false
    -e VALIDATE_LUA=false
    -e VALIDATE_MARKDOWN=false
    -e VALIDATE_MARKDOWN_PRETTIER=false
    -e VALIDATE_NATURAL_LANGUAGE=false
    -e VALIDATE_SHELL_SHFMT=false
    -e VALIDATE_TRIVY=false
    -e FILTER_REGEX_EXCLUDE='(^|/)(\.ansible/|\.collections/|\.task/|\.test/nvim/|\.venv/)'
    -v $(pwd):/tmp/lint

tasks:
  deps-os:
    status:
      - $SHELL -c 'type -P uv'
    cmd: >-
      {{.DEPS_OS_ARCHLINUX}}
      || sudo {{.DEPS_OS_ARCHLINUX}}
  deps-os-system:
    status:
      - $SHELL -c 'type -P uv'
      - $SHELL -c 'type -P git'
      - $SHELL -c 'type -P sudo'
    cmd: >-
      {{.DEPS_OS_SYSTEM_ARCHLINUX}}
      || sudo {{.DEPS_OS_SYSTEM_ARCHLINUX}}
  deps-python:
    silent: true
    deps: [deps-os]
    cmd: >-
      uv sync
      --locked
      --no-build
      --no-install-project
      --no-dev
      --managed-python
      --quiet
  deps-galaxy:
    silent: true
    deps: [deps-python]
    cmds:
      - "uv run ansible-galaxy install -r requirements.yml"
  deps-verify:
    deps: [deps-os]
    status:
      - $SHELL -c 'type -P actionlint'
      - $SHELL -c 'type -P npx'
      - $SHELL -c 'type -P pre-commit'
      - $SHELL -c 'type -P stylua'
    cmd: >-
      {{.DEPS_VERIFY_ARCHLINUX}} || sudo {{.DEPS_VERIFY_ARCHLINUX}}
  deps-docker:
    silent: true
    cmds:
      - >-
        type -P docker >/dev/null
        || {
          printf '%s\n' 'docker is required for go-task verify and go-task superlinter.' >&2;
          exit 1;
        }
      - >-
        docker info >/dev/null 2>&1
        || {
          printf '%s\n' 'a running Docker daemon is required for go-task verify and go-task superlinter.' >&2;
          exit 1;
        }
  deps-upgrade:
    cmds:
      - task: deps-upgrade:python
      - task: deps-upgrade:ansible
      - task: deps-upgrade:pre-commit
      - task: deps-upgrade:nvim
      - task: renovate
  deps-upgrade:python:
    deps: [deps-os]
    cmds:
      - uv lock --upgrade
      - >-
        uv sync
        --locked
        --no-build
        --no-install-project
        --no-dev
        --managed-python
  deps-upgrade:ansible:
    deps: [deps-python]
    cmd: "uv run ansible-galaxy collection install -r requirements.yml --upgrade"
  deps-upgrade:pre-commit:
    deps: [deps-verify]
    cmd: pre-commit autoupdate
  deps-upgrade:nvim:
    cmd: NVIM_USE_MASON=off nvim --headless "+Lazy! update" +qa
  deps-report:github-actions:
    deps: [deps-verify]
    cmd: >-
      npx --yes --package renovate renovate
      --platform=local
      --dry-run=full
      --require-config=required
      --enabled-managers=github-actions
      --include-paths='[".github/workflows/**"]'
  update:
    cmds:
      - git pull --ff-only
      - go-task

  lint:
    deps: [deps-python]
    cmds:
      - "uv run ansible-lint --exclude .test/"
  lint:ansible-semantics:
    deps: [deps-python]
    cmd: "uv run python .test/check_ansible_semantics.py"
  lint:english:
    cmd: "python3 .test/check_repo_english.py"
  yamllint:
    deps: [deps-python]
    cmd: "uv run yamllint ."
  vint:
    deps: [deps-python]
    cmd: >-
      PYTHONWARNINGS=ignore
      uv run python .test/vint_runner.py --enable-neovim {{.VINT_TARGETS}}
  stylua:
    deps: [deps-verify]
    cmd: "stylua --check {{.STYLUA_TARGETS}}"
  docs:nvim-keymaps:
    cmds:
      - mkdir -p docs
      - >-
        timeout 120s nvim --headless --clean -u NONE
        '+lua dofile(".test/nvim/keymap_docs.lua")'
        +qa > docs/nvim-keymaps.md
  docs:nvim-keymaps:check:
    cmds:
      - >-
        tmp="$(mktemp)";
        trap 'rm -f "${tmp}"' EXIT;
        timeout 120s nvim --headless --clean -u NONE
        '+lua dofile(".test/nvim/keymap_docs.lua")'
        +qa > "${tmp}";
        diff -u docs/nvim-keymaps.md "${tmp}"
  diff-check:
    cmd: git diff --check
  actionlint:
    deps: [deps-verify]
    cmd: actionlint .github/workflows/*.yml
  renovate:
    deps: [deps-verify]
    cmd: >-
      if type -P renovate-config-validator >/dev/null;
      then renovate-config-validator --strict;
      else npx --yes --package renovate renovate-config-validator --strict;
      fi
  pre-commit:
    deps: [deps-verify]
    cmd: pre-commit run --all-files
  doctor:
    cmd: "python3 .test/workstation_report.py doctor"
  dotfiles:plan:
    cmd: "python3 .test/workstation_report.py dotfiles-plan"
  system:report:
    cmd: "python3 .test/workstation_report.py system-report"
  browser-policies:report:
    cmd: "python3 .test/workstation_report.py browser-policies-report"
  managed-paths:check:
    deps: [deps-python]
    cmd: >-
      manifest="$(mktemp)";
      trap 'rm -f "${manifest}"' EXIT;
      uv run ansible-playbook .test/managed_paths.yml -e manifest_out="${manifest}" >/dev/null;
      python3 .test/check_managed_paths.py "${manifest}"
  verify:
    deps: [deps-galaxy, deps-verify]
    cmds:
      - task: diff-check
      - task: lint
      - task: lint:ansible-semantics
      - task: lint:english
      - task: yamllint
      - task: vint
      - task: stylua
      - task: docs:nvim-keymaps:check
      - task: actionlint
      - task: renovate
      - task: pre-commit
      - task: managed-paths:check
      - task: default
      - task: system:check
      - task: test:system
      - task: browser-policies:check
      - task: superlinter
  superlinter:
    deps: [deps-docker]
    cmds:
      - "{{.SUPERLINTER_DOCKER_RUN}} ghcr.io/super-linter/super-linter:{{.SUPERLINTER_IMAGE_TAG}}"
  superlinter:latest:
    deps: [deps-docker]
    vars:
      SUPERLINTER_IMAGE_TAG: "latest"
    cmds:
      - "{{.SUPERLINTER_DOCKER_RUN}} ghcr.io/super-linter/super-linter:{{.SUPERLINTER_IMAGE_TAG}}"
  clear:
    cmd: >-
      rm -rf
      .ansible
      .collections
      .task
      .venv
  default:
    deps: [deps-galaxy]
    cmd: "{{.RUN_PLAYBOOK}}"
  all:
    cmds:
      - task: default
      - task: system
      - task: browser-policies
  dotfiles:check:
    deps: [deps-galaxy]
    cmd: "{{.RUN_PLAYBOOK}} --check --diff"
  system:
    deps: [deps-galaxy]
    cmds:
      - task: deps-os-system
      - "{{.RUN_SYSTEM_PLAYBOOK}}"
  system:check:
    deps: [deps-galaxy]
    cmds:
      - task: deps-os-system
      - "{{.RUN_SYSTEM_PLAYBOOK}} --check"
  system:list:
    deps: [deps-python]
    cmd: "uv run ansible-playbook --list-tasks playbook_system.yml"
  pacdiff:
    cmd: >-
      type -P pacdiff >/dev/null
      || {
        printf '%s\n' 'pacdiff is missing; run go-task system first or install pacman-contrib.';
        exit 1;
      };
      pacdiff -o
  browser-policies:
    deps: [deps-galaxy]
    cmd: "{{.RUN_BROWSER_PLAYBOOK}} {{.CLI_ARGS}}"
  browser-policies:check:
    deps: [deps-galaxy]
    cmd: "{{.RUN_BROWSER_PLAYBOOK}} --check --diff {{.CLI_ARGS}}"
  test:nvim:
    env:
      XDG_CONFIG_HOME: &xdg_config_home "{{.PWD}}/.test/nvim/.config"
      XDG_DATA_HOME: &xdg_data_home "{{.PWD}}/.test/nvim/.data"
      XDG_STATE_HOME: &xdg_state_home "{{.PWD}}/.test/nvim/.state"
      XDG_CACHE_HOME: &xdg_cache_home "{{.PWD}}/.test/nvim/.cache"
      GOENV: "{{.PWD}}/.test/nvim/.state/go/env"
      NVIM_USE_MASON: "off"
      NVIM_TS_INSTALL: "auto"
      NVIM_TS_TIMEOUT_MS: "120000"
    cmds:
      - &nvim_bootstrap_clean >-
        rm -rf
        .test/nvim/.config/nvim
        .test/nvim/.data/nvim
        .test/nvim/.state/nvim
        .test/nvim/.cache/nvim
      - &nvim_bootstrap_mkdir mkdir -p .test/nvim/.config .test/nvim/.data .test/nvim/.state .test/nvim/.cache
      - &nvim_bootstrap_copy cp -a dotfiles/.config/nvim .test/nvim/.config/
      - timeout 300s nvim --headless "+Lazy! restore" +qa
      - diff -u dotfiles/.config/nvim/lazy-lock.json .test/nvim/.config/nvim/lazy-lock.json
      - task: test:nvim:mason-tools
      - timeout 180s nvim --headless "+lua dofile('.test/nvim/treesitter_install.lua')" +qa
      - timeout 120s nvim --headless "+checkhealth" +qa
      - timeout 120s nvim --headless "+checkhealth vim.lsp" +qa
      - timeout 120s nvim --headless "+lua dofile('.test/nvim/smoke.lua')"
  test:nvim:mason-tools:
    cmds:
      - >-
        timeout 120s nvim --headless --clean -u NONE
        '+lua dofile(".test/nvim/mason_tools.lua")'
  test:nvim:compat:
    env:
      XDG_CONFIG_HOME: *xdg_config_home
      XDG_DATA_HOME: *xdg_data_home
      XDG_STATE_HOME: *xdg_state_home
      XDG_CACHE_HOME: *xdg_cache_home
      NVIM_DOTFILES_DISABLE_PLUGINS: "1"
      NVIM_USE_MASON: "off"
    cmds:
      - *nvim_bootstrap_clean
      - *nvim_bootstrap_mkdir
      - *nvim_bootstrap_copy
      - timeout 60s nvim --headless "+lua dofile('.test/nvim/compat.lua')"
  test:nvim:all:
    cmds:
      - task: test:nvim
      - task: test:nvim:compat
  test:nvim:profile:
    deps: [test:nvim]
    env:
      XDG_CONFIG_HOME: *xdg_config_home
      XDG_DATA_HOME: *xdg_data_home
      XDG_STATE_HOME: *xdg_state_home
      XDG_CACHE_HOME: *xdg_cache_home
      NVIM_USE_MASON: "off"
    cmds:
      - >-
        profile_log="$(mktemp)";
        trap 'rm -f "${profile_log}"' EXIT;
        timeout 120s nvim --headless --startuptime "${profile_log}" +qa >/dev/null 2>&1;
        awk '/--- NVIM STARTED ---/ { printf "startup_ms=%s\n", $1 }' "${profile_log}"
      - >-
        timeout 120s nvim --headless
        '+lua local cfg=require("lazy.core.config"); local names={}; local total=0; for name,p in pairs(cfg.plugins) do total=total+1; if p._ and p._.loaded then table.insert(names,name) end end; table.sort(names); print("plugins_total=" .. total); print("plugins_loaded=" .. #names); print("loaded_plugins=" .. table.concat(names,","))'
        +qa
  test:system:
    deps: [deps-docker]
    cmd: >-
      docker run --rm -i
      -v "$(pwd):/.dotfiles:ro"
      archlinux:multilib-devel
      bash -c 'cd .dotfiles && ./.test/system/exec.sh'
