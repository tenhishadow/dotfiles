apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke
  labels:
    app.kubernetes.io/name: smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smoke
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smoke
    spec:
      containers:
        - name: smoke
          image: nginx:1.27
          ports:
            - containerPort: 80
