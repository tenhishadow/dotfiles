---
dotfiles_home: "{{ ansible_facts.user_dir }}"
dotfiles_user_id: "{{ ansible_facts.real_user_id }}"
dotfiles_user_group: "{{ ansible_facts.real_group_id }}"
dotfiles_location: "{{ playbook_dir }}/dotfiles"
dotfiles_dir_mode: "u=rwx,g=,o="
dotfiles_config_dir: "{{ dotfiles_home }}/.config"
dotfiles_bashrcd: "{{ dotfiles_home }}/.bashrc.d"
dotfiles_gnupg_dir: "{{ dotfiles_home }}/.gnupg"
dotfiles_ssh_dir: "{{ dotfiles_home }}/.ssh"
dotfiles_ssh_config_dir: "{{ dotfiles_ssh_dir }}/config.d"
dotfiles_crontab_path: /usr/bin/crontab
dotfiles_pam_environment_path: "{{ dotfiles_home }}/.pam_environment"
dotfiles_nvim_restore_cron_name: neovim lazy restore
dotfiles_nvim_restore_cron_job: 'nvim --headless "+Lazy! restore" +qa > ~/.nvim.log 2>&1'
dotfiles_legacy_cron_names:
  - dotfiles updates
  - vim-plug update/upgrade

dotfiles_directories:
  - path: "{{ dotfiles_bashrcd }}"
  - path: "{{ dotfiles_gnupg_dir }}"
  - path: "{{ dotfiles_config_dir }}"
  - path: "{{ dotfiles_config_dir }}/environment.d"
  - path: "{{ dotfiles_config_dir }}/htop"
  - path: "{{ dotfiles_config_dir }}/kitty"
  - path: "{{ dotfiles_config_dir }}/nvim"
  - path: "{{ dotfiles_config_dir }}/yamllint"
  - path: "{{ dotfiles_home }}/.mplayer"
  - path: "{{ dotfiles_ssh_dir }}"
  - path: "{{ dotfiles_ssh_config_dir }}"

# Temporary: do not enforce wildcard browser extension lockdown on this host.
browser_policies_extension_lockdown_enabled: false

dotfiles_mapping:
  bashrc:
    src: "{{ dotfiles_location }}/.bashrc"
    dest: "{{ dotfiles_home }}/.bashrc"
  bash_profile:
    src: "{{ dotfiles_location }}/.bash_profile"
    dest: "{{ dotfiles_home }}/.bash_profile"
  editorconfig:
    src: "{{ dotfiles_location }}/.editorconfig"
    dest: "{{ dotfiles_home }}/.editorconfig"
  gitconfig:
    src: "{{ dotfiles_location }}/.gitconfig"
    dest: "{{ dotfiles_home }}/.gitconfig"
  gitignore:
    src: "{{ dotfiles_location }}/.gitignore"
    dest: "{{ dotfiles_home }}/.gitignore"
  screenrc:
    src: "{{ dotfiles_location }}/.screenrc"
    dest: "{{ dotfiles_home }}/.screenrc"
  vimrc:
    src: "{{ dotfiles_location }}/.vimrc"
    dest: "{{ dotfiles_home }}/.vimrc"
  gpg_conf:
    src: "{{ dotfiles_location }}/.gnupg/gpg.conf"
    dest: "{{ dotfiles_gnupg_dir }}/gpg.conf"
  gpg_agent:
    src: "{{ dotfiles_location }}/.gnupg/gpg-agent.conf"
    dest: "{{ dotfiles_gnupg_dir }}/gpg-agent.conf"
  curlrc:
    src: "{{ dotfiles_location }}/.curlrc"
    dest: "{{ dotfiles_home }}/.curlrc"
  wgetrc:
    src: "{{ dotfiles_location }}/.wgetrc"
    dest: "{{ dotfiles_home }}/.wgetrc"
  yamllint:
    src: "{{ dotfiles_location }}/.yamllint"
    dest: "{{ dotfiles_config_dir }}/yamllint/config"
  yamllint_root:
    src: "{{ dotfiles_location }}/.yamllint"
    dest: "{{ dotfiles_home }}/.yamllint"
  ssh_config:
    src: "{{ dotfiles_location }}/.ssh/config"
    dest: "{{ dotfiles_ssh_dir }}/config"
  ssh_config_examples:
    src: "{{ dotfiles_location }}/.ssh/config.d/examples"
    dest: "{{ dotfiles_ssh_config_dir }}/examples"
  kitty_config:
    src: "{{ dotfiles_location }}/.config/kitty/kitty.conf"
    dest: "{{ dotfiles_config_dir }}/kitty/kitty.conf"
  kitty_theme:
    src: "{{ dotfiles_location }}/.config/kitty/theme.conf"
    dest: "{{ dotfiles_config_dir }}/kitty/theme.conf"
  htoprc:
    src: "{{ dotfiles_location }}/.config/htop/htoprc"
    dest: "{{ dotfiles_config_dir }}/htop/htoprc"
  user-dirs:
    src: "{{ dotfiles_location }}/.config/user-dirs.dirs"
    dest: "{{ dotfiles_config_dir }}/user-dirs.dirs"
  environment_d:
    src: "{{ dotfiles_location }}/.config/environment.d/99-dotfiles.conf"
    dest: "{{ dotfiles_config_dir }}/environment.d/99-dotfiles.conf"
  nvim_init:
    src: "{{ dotfiles_location }}/.config/nvim/init.lua"
    dest: "{{ dotfiles_config_dir }}/nvim/init.lua"
  nvim_lazy_lock:
    src: "{{ dotfiles_location }}/.config/nvim/lazy-lock.json"
    dest: "{{ dotfiles_config_dir }}/nvim/lazy-lock.json"
  nvim_lua:
    src: "{{ dotfiles_location }}/.config/nvim/lua/"
    dest: "{{ dotfiles_config_dir }}/nvim/lua"
  pylintrc:
    src: "{{ dotfiles_location }}/.pylintrc"
    dest: "{{ dotfiles_home }}/.pylintrc"
  mplayer:
    src: "{{ dotfiles_location }}/.mplayer/config"
    dest: "{{ dotfiles_home }}/.mplayer/config"
  starship:
    src: "{{ dotfiles_location }}/.config/starship.toml"
    dest: "{{ dotfiles_config_dir }}/starship.toml"

dotfiles_cleanup:
  - "{{ dotfiles_config_dir }}/nvim/init.vim"
  - "{{ dotfiles_home }}/.nvim"

motd_message: o_O
issue_message: o_O
ansible_managed: o_O

journald_config:
  storage: persistent
  compress: "yes"
  systemmaxuse: 50M

sshd_config:
  Port: "22"
  AddressFamily: "any"
  UseDNS: "no"
  SyslogFacility: "AUTHPRIV"
  LoginGraceTime: "1m"
  StrictModes: "yes"
  MaxAuthTries: "20"
  MaxSessions: "100"
  PermitRootLogin: "prohibit-password"
  PubkeyAuthentication: "yes"
  IgnoreRhosts: "yes"
  PasswordAuthentication: "yes" # pragma: allowlist secret
  PermitEmptyPasswords: "no"
  ClientAliveInterval: "300"
  AllowAgentForwarding: "yes"
  AllowTcpForwarding: "yes"
  ClientAliveCountMax: "2"
  UnusedConnectionTimeout: "300"
  RequiredRSASize: "2048"
  KerberosAuthentication: "no"
  Ciphers: "aes256-gcm@openssh.com,aes256-ctr"
  MACs: "hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com"
  KexAlgorithms: "sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512"
  HostKeyAlgorithms: "ssh-ed25519,rsa-sha2-512,rsa-sha2-256"

configure_sysctl: true
sysctl_params:
  fs.file-max: "2097152"
  fs.inotify.max_queued_events: "32768"
  fs.inotify.max_user_instances: "8192"
  fs.inotify.max_user_watches: "524288"
  net.ipv4.tcp_rfc1337: "1"
  net.ipv4.tcp_syncookies: "1"
  vm.swappiness: "10"
  vm.dirty_background_ratio: "5"
  vm.dirty_expire_centisecs: "3000"
  vm.dirty_ratio: "10"
  vm.dirty_writeback_centisecs: "500"
  vm.mmap_min_addr: "65536"
  vm.overcommit_memory: "0"
  vm.vfs_cache_pressure: "100"
  vm.zone_reclaim_mode: "0"
  net.ipv6.conf.default.disable_ipv6: "1"
  net.ipv6.conf.lo.disable_ipv6: "1"
  net.ipv6.conf.all.disable_ipv6: "1"
