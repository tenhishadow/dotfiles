---
dotfiles_directories:
  - path: "{{ dotfiles_bashrc_dir }}"
  - path: "{{ dotfiles_home }}/.terraform.d/plugin-cache"

dotfiles_mapping:
  - name: bashrc
    payload: .bashrc
    dest: "{{ dotfiles_home }}/.bashrc"
  - name: bash_profile
    payload: .bash_profile
    dest: "{{ dotfiles_home }}/.bash_profile"
  - name: editorconfig
    payload: .editorconfig
    dest: "{{ dotfiles_home }}/.editorconfig"
  - name: gitconfig
    payload: .gitconfig
    dest: "{{ dotfiles_home }}/.gitconfig"
  - name: gitignore
    payload: .gitignore
    dest: "{{ dotfiles_home }}/.gitignore"
  - name: gemini_settings
    payload: .gemini/settings.json
    dest: "{{ dotfiles_home }}/.gemini/settings.json"
  - name: terraformrc
    payload: .terraformrc
    dest: "{{ dotfiles_home }}/.terraformrc"
  - name: npmrc
    payload: .npmrc
    dest: "{{ dotfiles_home }}/.npmrc"
  - name: yarnrc
    payload: .yarnrc
    dest: "{{ dotfiles_home }}/.yarnrc"
  - name: luacheckrc
    payload: .luacheckrc
    dest: "{{ dotfiles_home }}/.luacheckrc"
  - name: vintrc
    payload: .vintrc.yaml
    dest: "{{ dotfiles_home }}/.vintrc.yaml"
  - name: screenrc
    payload: .screenrc
    dest: "{{ dotfiles_home }}/.screenrc"
  - name: vimrc
    payload: .vimrc
    dest: "{{ dotfiles_home }}/.vimrc"
  - name: gpg_conf
    payload: .gnupg/gpg.conf
    dest: "{{ dotfiles_gnupg_dir }}/gpg.conf"
  - name: gpg_agent
    payload: .gnupg/gpg-agent.conf
    dest: "{{ dotfiles_gnupg_dir }}/gpg-agent.conf"
  - name: curlrc
    payload: .curlrc
    dest: "{{ dotfiles_home }}/.curlrc"
  - name: wgetrc
    payload: .wgetrc
    dest: "{{ dotfiles_home }}/.wgetrc"
  - name: yamllint
    payload: .yamllint
    dest: "{{ dotfiles_config_dir }}/yamllint/config"
  - name: yamllint_root
    payload: .yamllint
    dest: "{{ dotfiles_home }}/.yamllint"
  - name: ssh_config
    payload: .ssh/config
    dest: "{{ dotfiles_ssh_dir }}/config"
  - name: ssh_config_examples
    payload: .ssh/config.d/examples
    dest: "{{ dotfiles_ssh_config_dir }}/examples"
  - name: kitty_config
    payload: .config/kitty/kitty.conf
    dest: "{{ dotfiles_config_dir }}/kitty/kitty.conf"
  - name: kitty_theme
    payload: .config/kitty/theme.conf
    dest: "{{ dotfiles_config_dir }}/kitty/theme.conf"
  - name: kitty_gruvbox_dark_alias
    payload: .config/kitty/gruvbox-dark.conf
    dest: "{{ dotfiles_config_dir }}/kitty/gruvbox-dark.conf"
  - name: kitty_gruvbox_dark
    payload: .config/kitty/gruvbox_dark.conf
    dest: "{{ dotfiles_config_dir }}/kitty/gruvbox_dark.conf"
  - name: kitty_gruvbox_dark_hard
    payload: .config/kitty/gruvbox_dark_hard.conf
    dest: "{{ dotfiles_config_dir }}/kitty/gruvbox_dark_hard.conf"
  - name: kitty_gruvbox_dark_soft
    payload: .config/kitty/gruvbox_dark_soft.conf
    dest: "{{ dotfiles_config_dir }}/kitty/gruvbox_dark_soft.conf"
  - name: kitty_gruvbox_light
    payload: .config/kitty/gruvbox_light.conf
    dest: "{{ dotfiles_config_dir }}/kitty/gruvbox_light.conf"
  - name: kitty_gruvbox_light_hard
    payload: .config/kitty/gruvbox_light_hard.conf
    dest: "{{ dotfiles_config_dir }}/kitty/gruvbox_light_hard.conf"
  - name: kitty_gruvbox_light_soft
    payload: .config/kitty/gruvbox_light_soft.conf
    dest: "{{ dotfiles_config_dir }}/kitty/gruvbox_light_soft.conf"
  - name: htoprc
    payload: .config/htop/htoprc
    dest: "{{ dotfiles_config_dir }}/htop/htoprc"
  - name: k9s_config
    payload: .config/k9s/config.yaml
    dest: "{{ dotfiles_config_dir }}/k9s/config.yaml"
  - name: bat_config
    payload: .config/bat/config
    dest: "{{ dotfiles_config_dir }}/bat/config"
  - name: ripgrep_config
    payload: .config/ripgrep/ripgreprc
    dest: "{{ dotfiles_config_dir }}/ripgrep/ripgreprc"
  - name: btop_config
    payload: .config/btop/btop.conf
    dest: "{{ dotfiles_config_dir }}/btop/btop.conf"
  - name: direnv_config
    payload: .config/direnv/direnv.toml
    dest: "{{ dotfiles_config_dir }}/direnv/direnv.toml"
  - name: pip_config
    payload: .config/pip/pip.conf
    dest: "{{ dotfiles_config_dir }}/pip/pip.conf"
  - name: mimeapps
    payload: .config/mimeapps.list
    dest: "{{ dotfiles_config_dir }}/mimeapps.list"
  - name: environment_d
    payload: .config/environment.d/99-dotfiles.conf
    dest: "{{ dotfiles_config_dir }}/environment.d/99-dotfiles.conf"
  - name: nvim_init
    payload: .config/nvim/init.lua
    dest: "{{ dotfiles_config_dir }}/nvim/init.lua"
  - name: nvim_lazy_lock
    payload: .config/nvim/lazy-lock.json
    dest: "{{ dotfiles_config_dir }}/nvim/lazy-lock.json"
  - name: nvim_lua
    payload: .config/nvim/lua
    dest: "{{ dotfiles_config_dir }}/nvim/lua"
  - name: pylintrc
    payload: .pylintrc
    dest: "{{ dotfiles_home }}/.pylintrc"
  - name: mplayer
    payload: .mplayer/config
    dest: "{{ dotfiles_home }}/.mplayer/config"
  - name: starship
    payload: .config/starship.toml
    dest: "{{ dotfiles_config_dir }}/starship.toml"

dotfiles_cleanup_paths:
  - "{{ dotfiles_config_dir }}/nvim/init.vim"
  - "{{ dotfiles_home }}/.nvim"
