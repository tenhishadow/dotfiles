---
- name: Apply user dotfiles
  hosts: this_host
  become: false
  connection: local
  gather_facts: true
  tasks:
    - name: Dotfiles | Validate inputs
      ansible.builtin.assert:
        that:
          - dotfiles_location is defined
          - dotfiles_location is string
          - dotfiles_location | length > 0
          - dotfiles_dir_mode is defined
          - dotfiles_dir_mode is string
          - dotfiles_directories is defined
          - dotfiles_directories is sequence
          - dotfiles_directories is not string
          - dotfiles_mapping is defined
          - dotfiles_mapping is mapping
          - dotfiles_cleanup is defined
          - dotfiles_cleanup is sequence
          - dotfiles_cleanup is not string
          - dotfiles_crontab_path is defined
          - dotfiles_crontab_path is string
          - dotfiles_pam_environment_path is defined
          - dotfiles_pam_environment_path is string
          - dotfiles_nvim_restore_cron_name is defined
          - dotfiles_nvim_restore_cron_name is string
          - dotfiles_nvim_restore_cron_job is defined
          - dotfiles_nvim_restore_cron_job is string
          - dotfiles_legacy_cron_names is defined
          - dotfiles_legacy_cron_names is sequence
          - dotfiles_legacy_cron_names is not string
      tags:
        - configs

    - name: Dotfiles | Validate directories
      ansible.builtin.assert:
        that:
          - item is mapping
          - item.path is defined
          - item.path is string
          - item.path | length > 0
          - item.mode is not defined or item.mode is string
          - item.owner is not defined or item.owner is string or item.owner is number
          - item.group is not defined or item.group is string or item.group is number
        fail_msg: "Invalid dotfiles directory entry: {{ item | to_nice_json }}"
        quiet: true
      loop: "{{ dotfiles_directories }}"
      loop_control:
        label: "{{ item.path | default('invalid directory entry') }}"
      tags:
        - configs

    - name: Dotfiles | Validate links
      ansible.builtin.assert:
        that:
          - item.value is mapping
          - item.value.src is defined
          - item.value.src is string
          - item.value.src | length > 0
          - item.value.dest is defined
          - item.value.dest is string
          - item.value.dest | length > 0
        fail_msg: "Invalid dotfiles mapping entry: {{ item | to_nice_json }}"
        quiet: true
      loop: "{{ dotfiles_mapping | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      tags:
        - configs

    - name: Dotfiles | Check payload sources
      ansible.builtin.stat:
        path: "{{ item.value.src }}"
      loop: "{{ dotfiles_mapping | dict2items }}"
      loop_control:
        label: "{{ item.value.src }}"
      register: dotfiles_payload_sources
      changed_when: false
      tags:
        - configs

    - name: Dotfiles | Validate payload sources
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: "Missing dotfiles payload source: {{ item.item.value.src }}"
        quiet: true
      loop: "{{ dotfiles_payload_sources.results }}"
      loop_control:
        label: "{{ item.item.value.src }}"
      tags:
        - configs

    - name: Dotfiles | Ensure parent directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode | default(dotfiles_dir_mode) }}"
        owner: "{{ item.owner | default(dotfiles_user_id) }}"
        group: "{{ item.group | default(dotfiles_user_group) }}"
      loop: "{{ dotfiles_directories }}"
      loop_control:
        label: "{{ item.path }}"
      tags:
        - configs

    - name: Dotfiles | Link payload
      ansible.builtin.file:
        src: "{{ item.value.src }}"
        dest: "{{ item.value.dest }}"
        force: true
        state: link
      loop: "{{ dotfiles_mapping | dict2items }}"
      loop_control:
        label: "{{ item.value.dest }}"
      tags:
        - configs

    - name: Dotfiles | Remove legacy paths
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ dotfiles_cleanup }}"
      tags:
        - configs

    - name: Dotfiles | Check crontab
      ansible.builtin.stat:
        path: "{{ dotfiles_crontab_path }}"
      register: dotfiles_crontab_bin
      changed_when: false

    - name: Dotfiles | Schedule Neovim restore
      ansible.builtin.cron:
        state: present
        name: "{{ dotfiles_nvim_restore_cron_name }}"
        job: "{{ dotfiles_nvim_restore_cron_job }}"
        special_time: daily
      when:
        - dotfiles_crontab_bin.stat.exists | default(false)

    - name: Dotfiles | Remove legacy cron jobs
      ansible.builtin.cron:
        state: absent
        name: "{{ item }}"
      loop: "{{ dotfiles_legacy_cron_names }}"
      loop_control:
        label: "{{ item }}"
      when:
        - dotfiles_crontab_bin.stat.exists | default(false)

    - name: Dotfiles | Remove .pam_environment
      ansible.builtin.file:
        path: "{{ dotfiles_pam_environment_path }}"
        state: absent
